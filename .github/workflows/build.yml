name: Check and Build
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [released]
permissions: read-all
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Debug flags
        shell: bash
        if: runner.debug == '1'
        run: echo 'FLAGS=-d' >> "$GITHUB_ENV"
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Lint code
        run: make ${{ env.FLAGS }} lint format
  test:
    name: Test ${{ matrix.os }}-py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Debug flags
        shell: bash
        if: runner.debug == '1'
        run: echo 'FLAGS=-d' >> "$GITHUB_ENV"
      - name: Install coreutils for macOS
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: brew install coreutils
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Install wheel
        run: pip install wheel 'setuptools>=80'
      - name: Cache test files
        uses: actions/cache@v4
        with:
          path: |
            .data/**
          key: test-files-${{ hashFiles('Makefile') }}
      - name: Run tests
        shell: bash
        run: make ${{ env.FLAGS }} test
  build-wheel:
    name: Build ${{ matrix.os}}-py${{ matrix.python }} wheel
    if: github.repository == 'Eeems/remarkable-update-image' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-15-intel
          - windows-latest
        python:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Debug flags
        shell: bash
        if: runner.debug == '1'
        run: echo 'FLAGS=-d' >> "$GITHUB_ENV"
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        if: matrix.os != 'ubuntu-latest'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Install wheel
        if: matrix.os != 'ubuntu-latest'
        run: pip install wheel 'setuptools>=80'
      - name: Install coreutils and ccache for macOS
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        run: brew install coreutils ccache
      - name: Building package
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: make ${{ env.FLAGS }} native-wheel
      - uses: actions/upload-artifact@v6
        if: matrix.os != 'ubuntu-latest'
        with:
          name: pip-wheel-${{ matrix.os }}-${{ matrix.python }}
          path: dist/*
          if-no-files-found: error
      - name: Building manylinux package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          python_version=${{ matrix.python }}
          python_version=cp${python_version//.}
          script=$(cat <<EOF
          cd /src;
          export PATH=\$PATH:/opt/python/$python_version-$python_version/bin;
          pip install "setuptools>=80";
          make ${{ env.FLAGS }} native-wheel;
          auditwheel repair dist/*.whl;
          EOF
          )
          docker run -v $(pwd):/src \
            quay.io/pypa/manylinux_2_34_x86_64:latest \
            /bin/bash -c "$script"
      - uses: actions/upload-artifact@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          name: pip-wheel-${{ matrix.os }}-${{ matrix.python }}
          path: wheelhouse/*
          if-no-files-found: error
  build-any-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build tool
        run: pip install build
      - name: Building package
        run: make wheel
      - uses: actions/upload-artifact@v6
        with:
          name: pip-wheel-none-any
          path: dist/*
          if-no-files-found: error
  build-sdist:
    name: Build sdist
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Debug flags
        shell: bash
        if: runner.debug == '1'
        run: echo 'FLAGS=-d' >> "$GITHUB_ENV"
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install wheel
        run: pip install wheel 'setuptools>=80'
      - name: Building package
        shell: bash
        run: make ${{ env.FLAGS }} sdist
      - uses: actions/upload-artifact@v6
        with:
          name: pip-sdist
          path: dist/*
          if-no-files-found: error
  publish:
    name: Publish to PyPi
    if: github.repository == 'Eeems/remarkable-update-image' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: &release-needs
      - build-sdist
      - build-any-wheel
      - build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/remarkable_update_image
    steps:
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.download.outputs.download-path }}
          skip-existing: true
  release:
    name: Add ${{ matrix.artifact }} to release
    if: github.repository == 'Eeems/remarkable-update-image' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: *release-needs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
      - name: Upload to release
        run: find . -type f | xargs -rI {} gh release upload "$TAG" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: ${{ steps.download.outputs.download-path }}
